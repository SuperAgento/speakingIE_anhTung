        const APP_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbycsbUpiwZgCKT0YkSO644R7CxkZMh76ocgz0knfZmIgjUf4qlKxe1NsUaqADvlNbJHnA/exec";

        // --- CÁC COMPONENT ICON ---
        const Mic = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" x2="12" y1="19" y2="22"></line></svg>;
        const CheckCircle2 = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><path d="m9 12 2 2 4-4"></path></svg>;
        const AlertCircle = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><line x1="12" x2="12" y1="8" y2="12"></line><line x1="12" x2="12.01" y1="16" y2="16"></line></svg>;

        const FileText = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" x2="8" y1="13" y2="13"></line><line x1="16" x2="8" y1="17" y2="17"></line><line x1="10" x2="8" y1="9" y2="9"></line></svg>;

        const Cloud = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"></path></svg>;
        const Save = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>;
        const Calendar = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="18" height="18" x="3" y="4" rx="2" ry="2"></rect><line x1="16" x2="16" y1="2" y2="6"></line><line x1="8" x2="8" y1="2" y2="6"></line><line x1="3" x2="21" y1="10" y2="10"></line></svg>;
        const Target = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>;
        const Eye = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>;
        const EyeOff = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" x2="22" y1="2" y2="22"/></svg>;
        const Edit3 = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>;
        const Plus = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>;
        const Trash2 = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>;
        const Loader = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={`animate-spin ${className}`}><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"/><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"/></svg>;
        const Zap = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>;

        // --- DỮ LIỆU LỘ TRÌNH THÁNG 4 ---
        const MONTHLY_SCHEDULE = [
            { date: '07/04', day: 'Thứ 3', content: 'Part 1: Reading', targetTab: 'part1', keyword: 'Reading' },
            { date: '08/04', day: 'Thứ 4', content: 'Part 1: Life stages', targetTab: 'part1', keyword: 'Life stage' },
            { date: '09/04', day: 'Thứ 5', content: 'Part 2: Planning', targetTab: 'part2', keyword: 'Planning' },
            { date: '10/04', day: 'Thứ 6', content: 'Part 3: Planning', targetTab: 'part3', keyword: 'Planning' },
            { date: '13/04', day: 'Thứ 2', content: 'Part 2: Expensive item', targetTab: 'part2', keyword: 'Expensive item' },
            { date: '14/04', day: 'Thứ 3', content: 'Part 3: Consumerism', targetTab: 'part3', keyword: 'Consumerism' },
            { date: '15/04', day: 'Thứ 4', content: 'Part 2: Problem solver', targetTab: 'part2', keyword: 'Problem solver' },
            { date: '16/04', day: 'Thứ 5', content: 'Part 3: Problem-solving', targetTab: 'part3', keyword: 'Problem' },
            { date: '17/04', day: 'Thứ 6', content: 'Part 2: Program/App', targetTab: 'part2', keyword: 'Program' },
            { date: '20/04', day: 'Thứ 2', content: 'Part 3: Technology', targetTab: 'part3', keyword: 'Technology' },
            { date: '21/04', day: 'Thứ 3', content: 'Part 2: Perfect job', targetTab: 'part2', keyword: 'Perfect job' },
            { date: '22/04', day: 'Thứ 4', content: 'Part 3: Careers', targetTab: 'part3', keyword: 'Career' },
            { date: '23/04', day: 'Thứ 5', content: 'Part 2: Tech piece', targetTab: 'part2', keyword: 'Tech piece' },
            { date: '24/04', day: 'Thứ 6', content: 'Part 3: Tech Ethics', targetTab: 'part3', keyword: 'Ethics' },
            { date: '27/04', day: 'Thứ 2', content: 'Part 2: Building', targetTab: 'part2', keyword: 'Building' },
            { date: '28/04', day: 'Thứ 3', content: 'Part 3: Architecture', targetTab: 'part3', keyword: 'Architecture' },
            { date: '29/04', day: 'Thứ 4', content: 'Part 2: Nature lover', targetTab: 'part2', keyword: 'Nature' },
            { date: '30/04', day: 'Thứ 5', content: 'Part 3: Environment', targetTab: 'part3', keyword: 'Environment' }
        ];

        // --- TIỆN ÍCH PHÂN TÍCH CSV ---
        const parseCSV = (text) => {
          const result = [];
          let row = [];
          let inQuotes = false;
          let currentValue = '';

          for (let i = 0; i < text.length; i++) {
            const char = text[i];
            if (char === '"') {
              if (inQuotes && text[i + 1] === '"') {
                currentValue += '"';
                i++;
              } else {
                inQuotes = !inQuotes;
              }
            } else if (char === ',' && !inQuotes) {
              row.push(currentValue.trim());
              currentValue = '';
            } else if (char === '\n' && !inQuotes) {
              row.push(currentValue.trim());
              result.push(row);
              row = [];
              currentValue = '';
            } else {
              currentValue += char;
            }
          }
          if (currentValue !== '' || row.length > 0) {
            row.push(currentValue.trim());
            result.push(row);
          }
          return result;
        };

        // --- COMPONENTS SOẠN THẢO TỪ VỰNG (VOCAB EDITOR) KÈM TÍNH NĂNG TÁCH CÂU (;) ---
        function VocabEditor({ questionId, questionText, initialData, onSave, onCancel }) {
            const [fullAnswer, setFullAnswer] = useState(initialData?.fullAnswer || '');
            const [pairs, setPairs] = useState(initialData?.pairs || [{ vi: '', en: '' }]);
            const [isSaving, setIsSaving] = useState(false);
            
            // Trạng thái cho Bulk Input
            const [bulkVi, setBulkVi] = useState('');
            const [bulkEn, setBulkEn] = useState('');

            const handleAddPair = () => setPairs([...pairs, { vi: '', en: '' }]);
            const handleRemovePair = (index) => setPairs(pairs.filter((_, i) => i !== index));
            const handlePairChange = (index, field, value) => {
                const newPairs = [...pairs];
                newPairs[index][field] = value;
                setPairs(newPairs);
            };

            // Tách câu tự động (Thêm \n để xuống dòng mỗi khi add câu mới)
            const handleBulkParse = () => {
                if (!bulkVi.trim() && !bulkEn.trim()) return;
                
                const viParts = bulkVi.split(';').map(s => s.trim());
                const enParts = bulkEn.split(';').map(s => s.trim());
                const maxLen = Math.max(viParts.length, enParts.length);
                
                const newPairs = [];
                for (let i = 0; i < maxLen; i++) {
                    newPairs.push({
                        vi: viParts[i] || '',
                        en: enParts[i] || ''
                    });
                }

                // Nếu đang là mặc định (chỉ có 1 ô trống), thì thay thế luôn. Ngược lại thì chèn xuống dòng.
                let updatedPairs = [...pairs];
                if (updatedPairs.length === 1 && !updatedPairs[0].vi && !updatedPairs[0].en) {
                    updatedPairs = newPairs;
                } else {
                    // Thêm 1 pair đặc biệt làm cờ (flag) "Ngắt dòng"
                    updatedPairs.push({ vi: '\n', en: '\n' });
                    updatedPairs = [...updatedPairs, ...newPairs];
                }
                
                setPairs(updatedPairs);
                setBulkVi('');
                setBulkEn('');
            };

            const handleSave = async () => {
                setIsSaving(true);
                // Lọc bỏ những cặp trống hoàn toàn (giữ lại các cặp đặc biệt '\n' để ngắt dòng)
                const validPairs = pairs.filter(p => p.vi.trim() !== '' || p.en.trim() !== '' || p.vi === '\n');
                await onSave(questionId, { fullAnswer, pairs: validPairs });
                setIsSaving(false);
            };

            return (
                <div className="bg-white border-2 border-indigo-200 rounded-xl p-5 shadow-md my-4 animate-in fade-in zoom-in-95 duration-200">
                    <h4 className="font-bold text-indigo-700 mb-2 flex items-center gap-2">
                        <Edit3 className="w-5 h-5"/> Biên soạn đáp án
                    </h4>
                    <p className="text-slate-800 font-medium mb-5 bg-slate-50 p-3 rounded-lg border border-slate-100">{questionText}</p>

                    <div className="mb-5">
                        <label className="block text-sm font-semibold text-slate-600 mb-2">Câu trả lời hoàn chỉnh (Tiếng Anh)</label>
                        <textarea
                            value={fullAnswer}
                            onChange={(e) => setFullAnswer(e.target.value)}
                            className="w-full border border-slate-300 rounded-lg p-3 text-slate-700 focus:ring-2 focus:ring-indigo-500 focus:outline-none transition-shadow"
                            rows="2"
                            placeholder="Ví dụ: Yes, definitely. Nowadays, there has been..."
                        />
                    </div>

                    {/* KHU VỰC TÁCH CÂU NHANH (;) */}
                    <div className="mb-6 bg-indigo-50/70 rounded-xl p-4 border border-indigo-100">
                        <label className="block text-sm font-bold text-indigo-800 mb-3 flex items-center gap-2">
                            <Zap className="w-4 h-4 text-amber-500" /> Tách câu tự động bằng dấu chấm phẩy (;)
                        </label>
                        <div className="flex flex-col gap-3">
                            <input
                                type="text"
                                value={bulkVi}
                                onChange={(e) => setBulkVi(e.target.value)}
                                placeholder="Tiếng Việt (VD: Tôi ; đã trải qua ; một giai đoạn ; tôi thích đọc sách)"
                                className="w-full border border-indigo-200 rounded-lg p-3 text-sm focus:ring-2 focus:ring-indigo-500 outline-none bg-white shadow-sm"
                            />
                            <input
                                type="text"
                                value={bulkEn}
                                onChange={(e) => setBulkEn(e.target.value)}
                                placeholder="Tiếng Anh (VD: I ; went through ; a phase ; I liked reading books)"
                                className="w-full border border-indigo-200 rounded-lg p-3 text-sm focus:ring-2 focus:ring-indigo-500 outline-none bg-white shadow-sm"
                            />
                            <button 
                                onClick={handleBulkParse} 
                                className="self-end px-5 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg text-sm font-medium transition-colors shadow-sm flex items-center gap-2"
                            >
                                Tách thành các cặp từ
                            </button>
                        </div>
                    </div>

                    <div className="mb-4">
                        <label className="block text-sm font-semibold text-slate-600 mb-3">Chỉnh sửa & Thêm bớt thủ công</label>
                        {pairs.map((pair, idx) => {
                            // Nếu đây là cặp "Ngắt dòng"
                            if (pair.vi === '\n' || pair.en === '\n') {
                                return (
                                    <div key={idx} className="flex gap-2 mb-3 items-center relative group">
                                        <div className="flex-1 border-b-2 border-dashed border-indigo-100"></div>
                                        <span className="text-xs font-semibold text-indigo-400 uppercase tracking-wider px-2">Ngắt dòng (Câu mới)</span>
                                        <div className="flex-1 border-b-2 border-dashed border-indigo-100"></div>
                                        <button onClick={() => handleRemovePair(idx)} title="Xóa ngắt dòng" className="p-2 text-slate-300 hover:text-rose-500 hover:bg-rose-50 rounded-lg transition-colors">
                                            <Trash2 className="w-5 h-5" />
                                        </button>
                                    </div>
                                );
                            }

                            // Cặp từ bình thường
                            return (
                                <div key={idx} className="flex gap-2 mb-3 items-start relative group">
                                    <div className="flex-1 flex flex-col gap-2">
                                        <input
                                            type="text"
                                            value={pair.vi}
                                            onChange={(e) => handlePairChange(idx, 'vi', e.target.value)}
                                            placeholder="Phần Tiếng Việt"
                                            className="w-full border border-slate-300 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-indigo-500 outline-none"
                                        />
                                        <input
                                            type="text"
                                            value={pair.en}
                                            onChange={(e) => handlePairChange(idx, 'en', e.target.value)}
                                            placeholder="Phần Tiếng Anh"
                                            className="w-full border border-slate-300 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-indigo-500 outline-none bg-slate-50"
                                        />
                                    </div>
                                    <button onClick={() => handleRemovePair(idx)} title="Xóa cụm này" className="p-2 text-slate-300 hover:text-rose-500 hover:bg-rose-50 rounded-lg transition-colors mt-1">
                                        <Trash2 className="w-5 h-5" />
                                    </button>
                                </div>
                            );
                        })}
                        
                        <div className="flex gap-2 mt-2">
                            <button onClick={handleAddPair} className="px-4 py-2 border-2 border-dashed border-indigo-200 rounded-lg flex items-center justify-center gap-2 flex-1 text-sm font-semibold text-indigo-600 hover:bg-indigo-50 transition-colors">
                                <Plus className="w-4 h-4" /> Thêm cặp từ
                            </button>
                            <button onClick={() => setPairs([...pairs, { vi: '\n', en: '\n' }])} className="px-4 py-2 border-2 border-dashed border-slate-200 rounded-lg flex items-center justify-center gap-2 text-sm font-semibold text-slate-500 hover:bg-slate-50 transition-colors">
                                Thêm ngắt dòng
                            </button>
                        </div>
                    </div>

                    <div className="flex gap-3 justify-end mt-6 pt-4 border-t border-slate-100">
                        <button onClick={onCancel} className="px-5 py-2.5 text-slate-600 bg-slate-100 hover:bg-slate-200 rounded-lg font-medium transition-colors">Hủy</button>
                        <button onClick={handleSave} disabled={isSaving} className="px-6 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg font-medium flex items-center gap-2 disabled:opacity-50 transition-colors shadow-sm">
                            {isSaving ? <Loader className="w-4 h-4" /> : <Save className="w-4 h-4" />}
                            {isSaving ? 'Đang lưu...' : 'Lưu Database'}
                        </button>
                    </div>
                </div>
            );
        }

        // --- COMPONENT HIỂN THỊ 1 CÂU HỎI KÈM CHỨC NĂNG SỬA ---
        function QuestionItem({ questionId, index, questionText, customData, onSave }) {
            const [isEditing, setIsEditing] = useState(false);
            const [showEnglish, setShowEnglish] = useState(false);

            const handleSave = async (id, data) => {
                await onSave(id, data);
                setIsEditing(false);
                setShowEnglish(true); // Tự động mở tiếng Anh sau khi lưu để xem kết quả
            };

            if (isEditing) {
                return <VocabEditor questionId={questionId} questionText={questionText} initialData={customData} onSave={handleSave} onCancel={() => setIsEditing(false)} />;
            }

            // Nếu câu hỏi đã có dữ liệu tùy chỉnh (Vocab)
            if (customData && (customData.fullAnswer || (customData.pairs && customData.pairs.length > 0))) {
                return (
                    <div className="mb-5 bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                        <div className="flex flex-col sm:flex-row sm:items-start justify-between gap-4 mb-5">
                            <div className="flex gap-3 items-start flex-1">
                                <div className="flex-shrink-0 w-6 h-6 rounded-full bg-indigo-100 text-indigo-700 flex items-center justify-center text-sm font-bold mt-0.5">{index + 1}</div>
                                <h3 className="text-lg font-bold text-slate-900">{questionText}</h3>
                            </div>
                            <div className="flex gap-2 flex-shrink-0">
                                 <button onClick={() => setShowEnglish(!showEnglish)} className="px-3 py-1.5 bg-slate-100 text-slate-700 hover:bg-slate-200 rounded-lg text-sm font-medium flex items-center gap-1 transition-colors">
                                    {showEnglish ? <EyeOff className="w-4 h-4"/> : <Eye className="w-4 h-4"/>} {showEnglish ? 'Ẩn TA' : 'Hiện TA'}
                                 </button>
                                 <button onClick={() => setIsEditing(true)} className="px-3 py-1.5 bg-indigo-50 text-indigo-600 hover:bg-indigo-100 rounded-lg text-sm font-medium flex items-center gap-1 transition-colors">
                                    <Edit3 className="w-4 h-4"/> Sửa
                                 </button>
                            </div>
                        </div>

                        {/* Bảng Từ Vựng */}
                        {customData.pairs && customData.pairs.length > 0 && (
                            <div className="flex flex-wrap gap-2 mb-4">
                                {customData.pairs.map((pair, idx) => {
                                    // Nếu gặp khối ngắt dòng thì render ra thẻ div chiếm 100% chiều rộng để bẻ dòng
                                    if (pair.vi === '\n' || pair.en === '\n') {
                                        return <div key={idx} className="w-full h-3 border-b border-dashed border-slate-200 mb-2"></div>;
                                    }

                                    return (
                                        <div key={idx} className="flex flex-col bg-slate-50 border border-slate-200 rounded-xl p-2.5 flex-grow sm:flex-grow-0 min-w-[120px]">
                                            <span className="font-medium text-slate-800 text-center text-[15px]">{pair.vi}</span>
                                            <div className={`transition-all duration-300 flex flex-col justify-center items-center ${showEnglish ? 'mt-2 pt-2 border-t border-slate-200 opacity-100 max-h-20' : 'opacity-0 max-h-0 overflow-hidden'}`}>
                                                <span className="text-indigo-600 font-semibold text-center">{pair.en}</span>
                                            </div>
                                            {!showEnglish && <div className="mt-1.5 text-center text-slate-300 font-bold tracking-widest select-none leading-none">...</div>}
                                        </div>
                                    );
                                })}
                            </div>
                        )}

                        {/* Full Answer */}
                        {customData.fullAnswer && (
                            <div className={`transition-all duration-300 origin-top ${showEnglish ? 'opacity-100 max-h-[1000px]' : 'opacity-0 max-h-0 overflow-hidden'}`}>
                                <div className="bg-indigo-50 border border-indigo-100 rounded-xl p-4 text-slate-800 leading-relaxed font-medium shadow-inner">
                                    {customData.fullAnswer}
                                </div>
                            </div>
                        )}
                    </div>
                );
            }

            // Giao diện câu hỏi thường (Chưa có đáp án)
            return (
                <div className="p-4 bg-white border border-slate-200 rounded-xl shadow-sm flex gap-3 items-start mb-4 group hover:border-indigo-300 transition-colors">
                    <div className="flex-shrink-0 w-6 h-6 rounded-full bg-blue-100 text-blue-700 flex items-center justify-center text-sm font-bold mt-0.5">
                        {index + 1}
                    </div>
                    <div className="flex-1 flex flex-col xl:flex-row justify-between items-start xl:items-center gap-3">
                        <p className="text-slate-700 text-lg flex-1">{questionText}</p>
                        <button onClick={() => setIsEditing(true)} className="opacity-0 group-hover:opacity-100 transition-opacity text-sm font-semibold text-indigo-600 hover:text-indigo-800 flex items-center gap-1 bg-indigo-50 px-3 py-1.5 rounded-lg flex-shrink-0">
                            <Plus className="w-4 h-4"/> Thêm đáp án & Tách từ
                        </button>
                    </div>
                </div>
            );
        }

        // --- COMPONENT CHÍNH ---
        function App() {
          const [activeTab, setActiveTab] = useState('schedule');
          const [data, setData] = useState({ part1: [], part2: [], part3: [] });
          const [loading, setLoading] = useState(true);
          const [fetchStatus, setFetchStatus] = useState({ success: false, message: '' });

          // Lưu trạng thái Vocab tuỳ chỉnh
          const [customVocabs, setCustomVocabs] = useState(() => {
              const stored = {};
              for (let i = 0; i < localStorage.length; i++) {
                  const key = localStorage.key(i);
                  if (key && key.startsWith('vocab_')) {
                      try { stored[key.replace('vocab_', '')] = JSON.parse(localStorage.getItem(key)); } catch(e){}
                  }
              }
              return stored;
          });

          const [selectedTopicPart1, setSelectedTopicPart1] = useState(null);
          const [selectedTopicPart2, setSelectedTopicPart2] = useState(null);
          const [selectedTopicPart3, setSelectedTopicPart3] = useState(null);

          const handleNavigateFromSchedule = (targetTab, keyword) => {
              let list = [];
              let setter = null;
              if (targetTab === 'part1') { list = data.part1; setter = setSelectedTopicPart1; }
              if (targetTab === 'part2') { list = data.part2; setter = setSelectedTopicPart2; }
              if (targetTab === 'part3') { list = data.part3; setter = setSelectedTopicPart3; }

              if (list.length > 0 && keyword) {
                  const match = list.find(t => t.topic && t.topic.toLowerCase().includes(keyword.toLowerCase()));
                  if (match) setter(match);
                  else setter(list[0] || null);
              }
              setActiveTab(targetTab);
          };

          // Hàm lưu Vocab lên Google Sheets
          const handleSaveVocab = async (questionId, vocabData) => {
              setCustomVocabs(prev => ({ ...prev, [questionId]: vocabData }));
              localStorage.setItem(`vocab_${questionId}`, JSON.stringify(vocabData));

              try {
                  await fetch(APP_SCRIPT_URL, {
                      method: 'POST',
                      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                      body: JSON.stringify({
                          action: 'saveVocab',
                          id: questionId,
                          fullAnswer: vocabData.fullAnswer,
                          pairs: vocabData.pairs
                      })
                  });
              } catch (err) {
                  console.error('Lỗi khi lưu Vocab lên Cloud:', err);
              }
          };

          const sheetId = '1ftNAvvECs2DvDsrLDcC9EM8TD1rCOnTUT29OzUAxgfc';

          useEffect(() => {
            const fetchInitialData = async () => {
              setLoading(true);
              
              try {
                fetch(`${APP_SCRIPT_URL}?action=getNotes`)
                  .then(res => res.json())
                  .then(json => {
                    if (json.success && json.data) {
                      Object.keys(json.data).forEach(id => localStorage.setItem(`note_${id}`, json.data[id]));
                    }
                  }).catch(() => {});

                fetch(`${APP_SCRIPT_URL}?action=getVocab`)
                  .then(res => res.json())
                  .then(json => {
                    if (json.success && json.data) {
                      setCustomVocabs(json.data);
                      Object.keys(json.data).forEach(id => localStorage.setItem(`vocab_${id}`, JSON.stringify(json.data[id])));
                    }
                  }).catch(() => {});
              } catch(e) {}

              try {
                const fetchSheet = async (sheetName) => {
                  const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&sheet=${sheetName}`;
                  const response = await fetch(url);
                  if (!response.ok) throw new Error('Network response not ok');
                  const text = await response.text();
                  if (text.trim().startsWith('<')) throw new Error('Sheet is private');
                  
                  const rows = parseCSV(text);
                  const isVocabFormat = rows.some(r => String(r[0] || '').trim().toLowerCase() === 'câu hỏi');

                  if (isVocabFormat) {
                      const items = [];
                      let currentItem = null;

                      for (let i = 0; i < rows.length; i++) {
                          const row = rows[i];
                          const col0 = String(row[0] || '').trim().toLowerCase();

                          if (col0 === 'câu hỏi') {
                              if (currentItem) items.push(currentItem);
                              currentItem = {
                                  id: `${sheetName}-vocab-${i}`,
                                  type: 'vocab',
                                  topic: row[1] || 'Câu hỏi chưa có tên',
                                  question: row[1] || '',
                                  fullAnswer: '',
                                  pairs: []
                              };
                          } else if (col0 === 'ta' && currentItem) {
                              currentItem.fullAnswer = row[1] || '';
                          } else if (currentItem) {
                              const isNotEmpty = row.some(cell => String(cell).trim() !== '');
                              if (isNotEmpty && i + 1 < rows.length) {
                                  const enRow = rows[i+1];
                                  let addedPair = false;
                                  for (let j = 0; j < Math.max(row.length, enRow.length); j++) {
                                      const viText = String(row[j] || '').trim();
                                      const enText = String(enRow[j] || '').trim();
                                      if (viText || enText) {
                                          currentItem.pairs.push({ vi: viText, en: enText });
                                          addedPair = true;
                                      }
                                  }
                                  if (addedPair) i++; 
                              }
                          }
                      }
                      if (currentItem) items.push(currentItem);
                      return items;
                      
                  } else {
                      return rows.slice(1).map((row, index) => {
                        const topic = row[0] || 'Chưa phân loại';
                        let content = '';
                        
                        if (sheetName === 'DB02') {
                          content = row[1] || '';
                          if (row[2]) content += '\n' + row[2];
                        } else if (sheetName === 'DB03') {
                          const questions = [row[2], row[3], row[4]].filter(q => q && q.trim() !== '');
                          content = questions.join('\n');
                        } else {
                          const questions = row.slice(1).filter(q => q && q.trim() !== '');
                          content = questions.join('\n');
                        }

                        return {
                          id: `${sheetName}-std-${index}`,
                          type: 'standard',
                          topic: topic,
                          content: content
                        };
                      }).filter(item => item.topic && item.content);
                  }
                };

                const [part1Data, part2Data, part3Data] = await Promise.all([
                  fetchSheet('DB01'),
                  fetchSheet('DB02'),
                  fetchSheet('DB03')
                ]);

                setData({ part1: part1Data, part2: part2Data, part3: part3Data });
                setFetchStatus({ success: true, message: 'Đã tải dữ liệu thành công từ Google Sheets!' });
              } catch (error) {
                setFetchStatus({ success: false, message: 'Không thể truy cập Google Sheets hoặc bị lỗi định dạng.' });
              } finally {
                setLoading(false);
              }
            };

            fetchInitialData();
          }, []);

          return (
            <div className="min-h-screen bg-slate-50 text-slate-800 font-sans">
              <header className="bg-white shadow-sm border-b border-slate-200">
                {/* Đã mở rộng Full Width */}
                <div className="w-full px-4 py-4 sm:px-6 lg:px-8 flex justify-between items-center">
                  <div className="flex items-center gap-2">
                    <Mic className="w-6 h-6 text-blue-600" />
                    <h1 className="text-xl font-bold text-slate-900">IELTS Speaking Pro</h1>
                  </div>
                </div>
              </header>

              {/* Đã mở rộng Full Width */}
              <main className="w-full px-4 py-6 sm:px-6 lg:px-8">
                {!loading && (
                  <div className={`mb-6 p-4 rounded-lg flex items-start gap-3 ${fetchStatus.success ? 'bg-emerald-50 text-emerald-700' : 'bg-amber-50 text-amber-700'}`}>
                    {fetchStatus.success ? <CheckCircle2 className="w-5 h-5 mt-0.5 flex-shrink-0" /> : <AlertCircle className="w-5 h-5 mt-0.5 flex-shrink-0" />}
                    <div>
                      <p className="text-sm font-medium">{fetchStatus.message}</p>
                    </div>
                  </div>
                )}

                <div className="flex space-x-1 bg-slate-200/60 p-1 rounded-xl mb-6 overflow-x-auto">
                  {['schedule', 'part1', 'part2', 'part3'].map((tab) => (
                    <button
                      key={tab}
                      onClick={() => setActiveTab(tab)}
                      className={`flex-1 min-w-[120px] py-2.5 px-4 rounded-lg text-sm font-medium transition-all duration-200 flex items-center justify-center gap-2 ${
                        activeTab === tab 
                          ? 'bg-white text-blue-700 shadow-sm' 
                          : 'text-slate-600 hover:text-slate-900 hover:bg-slate-200'
                      }`}
                    >
                      {tab === 'schedule' && <Calendar className="w-4 h-4" />}
                      {tab === 'schedule' ? 'Lộ trình' : tab === 'part1' ? 'Part 1 (DB01)' : tab === 'part2' ? 'Part 2 (DB02)' : 'Part 3 (DB03)'}
                    </button>
                  ))}
                </div>

                {loading ? (
                  <div className="flex justify-center items-center py-20">
                    <div className="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div>
                  </div>
                ) : (
                  <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden min-h-[500px]">
                    {activeTab === 'schedule' && <ScheduleView handleNavigate={handleNavigateFromSchedule} />}
                    {activeTab === 'part1' && <SimpleListView title="Part 1: General Questions" data={data.part1} selectedTopic={selectedTopicPart1} setSelectedTopic={setSelectedTopicPart1} customVocabs={customVocabs} onSaveVocab={handleSaveVocab} />}
                    {activeTab === 'part2' && <Part2View data={data.part2} selectedTopic={selectedTopicPart2} setSelectedTopic={setSelectedTopicPart2} />}
                    {activeTab === 'part3' && <SimpleListView title="Part 3: Discussion" data={data.part3} selectedTopic={selectedTopicPart3} setSelectedTopic={setSelectedTopicPart3} customVocabs={customVocabs} onSaveVocab={handleSaveVocab} />}
                  </div>
                )}
              </main>
            </div>
          );
        }

        // --- VIEW CHO PART 1 & PART 3 ---
        function SimpleListView({ title, data, selectedTopic, setSelectedTopic, customVocabs, onSaveVocab }) {
          
          if (!data || data.length === 0) return <div className="p-8 text-center text-slate-500">Chưa có dữ liệu</div>;

          return (
            <div className="flex flex-col md:flex-row h-full min-h-[500px]">
              {/* SIDEBAR BÊN TRÁI - CHIA TỶ LỆ KHI FULL WIDTH */}
              <div className="w-full md:w-1/3 lg:w-1/4 xl:w-[20%] border-r border-slate-200 bg-slate-50/50 flex flex-col max-h-[600px] md:max-h-[800px]">
                <div className="p-4 border-b border-slate-200 font-semibold text-slate-800 bg-slate-50">
                  Danh sách chủ đề
                </div>
                <div className="overflow-y-auto flex-1">
                  {data.map((item) => (
                    <button
                      key={item.id}
                      onClick={() => setSelectedTopic(item)}
                      className={`w-full text-left px-4 py-3 border-b border-slate-100 flex items-center justify-between transition-colors ${
                        selectedTopic?.id === item.id ? 'bg-blue-50 border-l-4 border-l-blue-600' : 'hover:bg-slate-100 border-l-4 border-l-transparent'
                      }`}
                    >
                      <div className="flex flex-col pr-2 overflow-hidden w-full">
                        {item.type === 'vocab' ? (
                            <span className={`font-medium line-clamp-2 text-sm leading-snug ${selectedTopic?.id === item.id ? 'text-blue-800' : 'text-slate-700'}`}>
                              {item.topic}
                            </span>
                        ) : (
                            <>
                                <span className={`text-xs font-semibold uppercase tracking-wider mb-0.5 ${selectedTopic?.id === item.id ? 'text-blue-500' : 'text-slate-400'}`}>
                                  {item.topic}
                                </span>
                                <span className={`font-medium truncate ${selectedTopic?.id === item.id ? 'text-blue-800' : 'text-slate-700'}`}>
                                  {item.content.split('\n')[0]}
                                </span>
                            </>
                        )}
                      </div>
                      <ChevronRight className={`w-4 h-4 flex-shrink-0 ${selectedTopic?.id === item.id ? 'text-blue-500' : 'text-slate-400'}`} />
                    </button>
                  ))}
                </div>
              </div>

              {/* KHU VỰC HIỂN THỊ CHÍNH (BÊN PHẢI) - CHIA TỶ LỆ */}
              <div className="w-full md:w-2/3 lg:w-3/4 xl:w-[80%] flex flex-col bg-slate-50 relative overflow-y-auto max-h-[600px] md:max-h-[800px]">
                {selectedTopic ? (
                  <div className="p-6 md:p-8 animate-in fade-in duration-300">
                    
                    {selectedTopic.type === 'vocab' ? (
                        <QuestionItem 
                            questionId={selectedTopic.id} 
                            index={0} 
                            questionText={selectedTopic.question} 
                            customData={customVocabs[selectedTopic.id] || selectedTopic} 
                            onSave={onSaveVocab} 
                        />
                    ) : (
                        <div>
                            <h2 className="text-2xl font-bold text-slate-900 mb-6 border-b border-slate-200 pb-4">{selectedTopic.topic}</h2>
                            <div className="space-y-2">
                              {selectedTopic.content.split('\n').filter(q => q.trim()).map((q, idx) => {
                                  const qId = `${selectedTopic.id}-q${idx}`;
                                  return (
                                      <QuestionItem 
                                          key={qId} 
                                          questionId={qId} 
                                          index={idx} 
                                          questionText={q.trim()} 
                                          customData={customVocabs[qId]} 
                                          onSave={onSaveVocab} 
                                      />
                                  );
                              })}
                            </div>
                        </div>
                    )}
                  </div>
                ) : (
                  <div className="h-full flex flex-col items-center justify-center text-slate-400 p-8 text-center mt-20">
                    <BookOpen className="w-16 h-16 mb-4 text-slate-300" />
                    <p className="text-lg font-medium text-slate-500">Chọn một chủ đề bên trái để bắt đầu luyện tập</p>
                  </div>
                )}
              </div>
            </div>
          );
        }

        // --- VIEW CHO PART 2 ---
        function Part2View({ data, selectedTopic, setSelectedTopic }) {
          if (!data || data.length === 0) return <div className="p-8 text-center text-slate-500">Chưa có dữ liệu cho Part 2</div>;

          return (
            <div className="flex flex-col md:flex-row h-full min-h-[600px]">
              <div className="w-full md:w-1/3 lg:w-1/4 xl:w-[20%] border-r border-slate-200 bg-slate-50/50 flex flex-col">
                <div className="p-4 border-b border-slate-200 font-semibold text-slate-800 bg-slate-50">
                  Topics (Cue Cards)
                </div>
                <div className="overflow-y-auto flex-1 max-h-[600px] md:max-h-[800px]">
                  {data.map((item) => (
                    <button
                      key={item.id}
                      onClick={() => setSelectedTopic(item)}
                      className={`w-full text-left px-4 py-3 border-b border-slate-100 transition-colors ${
                        selectedTopic?.id === item.id ? 'bg-blue-50 border-l-4 border-l-blue-600' : 'hover:bg-slate-100 border-l-4 border-l-transparent'
                      }`}
                    >
                      <p className="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">
                        {item.topic}
                      </p>
                      <p className={`font-medium line-clamp-2 text-sm leading-snug ${selectedTopic?.id === item.id ? 'text-blue-800' : 'text-slate-700'}`}>
                        {item.content.split('\n')[0]}
                      </p>
                    </button>
                  ))}
                </div>
              </div>

              <div className="w-full md:w-2/3 lg:w-3/4 xl:w-[80%] flex flex-col bg-slate-50">
                {selectedTopic ? (
                  <PracticeWorkspace topic={selectedTopic} key={selectedTopic.id} />
                ) : (
                  <div className="h-full flex flex-col items-center justify-center text-slate-400 p-8 mt-20">
                    <FileText className="w-16 h-16 mb-4 text-slate-300" />
                    <p className="text-lg font-medium text-slate-500">Chọn một Cue Card để bắt đầu luyện tập</p>
                  </div>
                )}
              </div>
            </div>
          );
        }

        // --- KHU VỰC WORKSPACE CHO PART 2 (CHỨA TIMER & NOTES) ---
        function PracticeWorkspace({ topic }) {
          const [timeLeft, setTimeLeft] = useState(120);
          const [isActive, setIsActive] = useState(false);
          const [isFinished, setIsFinished] = useState(false);
          
          const [notes, setNotes] = useState(() => {
             return localStorage.getItem(`note_${topic.id}`) || '';
          });
          const [syncStatus, setSyncStatus] = useState(''); 

          useEffect(() => {
            let interval = null;
            if (isActive && timeLeft > 0) {
              interval = setInterval(() => { setTimeLeft(t => t - 1); }, 1000);
            } else if (timeLeft === 0 && isActive) {
              setIsActive(false); setIsFinished(true); clearInterval(interval);
            }
            return () => clearInterval(interval);
          }, [isActive, timeLeft]);

          const toggleTimer = () => {
            if (timeLeft === 0) { setTimeLeft(120); setIsFinished(false); }
            setIsActive(!isActive);
          };

          const resetTimer = () => { setIsActive(false); setTimeLeft(120); setIsFinished(false); };
          const formatTime = (sec) => `${Math.floor(sec / 60).toString().padStart(2, '0')}:${(sec % 60).toString().padStart(2, '0')}`;
          const progress = ((120 - timeLeft) / 120) * 100;

          const handleNoteChange = (e) => {
            const val = e.target.value;
            setNotes(val);
            localStorage.setItem(`note_${topic.id}`, val);
            setSyncStatus('unsaved');
          };

          const handleSaveNote = async () => {
            setSyncStatus('saving');
            try {
              const response = await fetch(APP_SCRIPT_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify({
                  action: 'saveNote',
                  id: topic.id,
                  note: notes
                })
              });
              
              const result = await response.json();
              if (result.success) {
                setSyncStatus('saved');
              } else {
                setSyncStatus('error');
              }
            } catch (err) {
              console.error("Lỗi khi đồng bộ Note lên Cloud:", err);
              setSyncStatus('error');
            }
          };

          const clearNotes = () => {
             if (confirm("Bạn có chắc muốn xóa ghi chú này?")) {
                 setNotes('');
                 localStorage.removeItem(`note_${topic.id}`);
                 setSyncStatus('saving');
                 fetch(APP_SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ action: 'saveNote', id: topic.id, note: '' })
                 }).then(r => r.json()).then(res => {
                    if (res.success) setSyncStatus('saved');
                    else setSyncStatus('error');
                 }).catch(() => setSyncStatus('error'));
             }
          };

          return (
            <div className="flex flex-col h-full animate-in fade-in duration-300">
              <div className="p-6 md:p-8 bg-white border-b border-slate-200 shadow-sm">
                <h2 className="text-xl md:text-2xl font-bold text-slate-900 mb-4">{topic.topic}</h2>
                <div className="bg-amber-50/50 border border-amber-100 rounded-xl p-5 text-slate-700 whitespace-pre-line text-lg leading-relaxed">
                  {topic.content}
                </div>
              </div>

              <div className="p-6 md:p-8 flex-1 flex flex-col gap-6 bg-slate-50">
                <div className="bg-white rounded-2xl p-5 shadow-sm border border-slate-200 flex flex-col xl:flex-row items-center justify-between gap-4">
                  <div className="flex items-center gap-4">
                    <div className={`text-4xl font-mono font-bold tracking-tight w-32 text-center ${timeLeft <= 10 ? 'text-rose-600 animate-pulse' : 'text-slate-800'}`}>
                      {formatTime(timeLeft)}
                    </div>
                    <div className="flex gap-2">
                      <button onClick={toggleTimer} className={`flex items-center gap-2 px-5 py-2.5 rounded-lg font-semibold text-white transition-all ${isActive ? 'bg-rose-500 hover:bg-rose-600' : 'bg-blue-600 hover:bg-blue-700'} shadow-sm`}>
                        {isActive ? <Square className="w-5 h-5 fill-current" /> : <Play className="w-5 h-5 fill-current" />}
                        {isActive ? 'Dừng' : 'Bắt đầu (2 phút)'}
                      </button>
                      <button onClick={resetTimer} className="px-4 py-2.5 rounded-lg font-medium text-slate-600 bg-slate-100 hover:bg-slate-200 transition-colors">Làm lại</button>
                    </div>
                  </div>
                  <div className="w-full xl:w-1/3 h-2 bg-slate-100 rounded-full overflow-hidden">
                    <div className={`h-full transition-all duration-1000 linear ${timeLeft <= 10 ? 'bg-rose-500' : 'bg-blue-500'}`} style={{ width: `${progress}%` }}></div>
                  </div>
                </div>

                {isFinished && (
                  <div className="bg-green-50 text-green-700 border border-green-200 p-4 rounded-xl flex items-center justify-center gap-2 animate-in slide-in-from-top-2">
                    <CheckCircle2 className="w-5 h-5" />
                    <span className="font-medium">Đã hết 2 phút! Bài nói của bạn đã hoàn thành.</span>
                  </div>
                )}

                {/* Khu vực Ghi chú */}
                <div className="flex-1 flex flex-col bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden relative">
                  <div className="bg-slate-50 border-b border-slate-200 px-4 py-3 flex items-center justify-between">
                    <div className="flex items-center gap-3">
                      <div className="flex items-center gap-2 text-slate-700 font-medium">
                        <FileText className="w-4 h-4" />
                        Ghi chú nháp (Notes)
                      </div>
                      <div className="flex items-center gap-1 text-xs">
                        {syncStatus === 'unsaved' && <span className="text-amber-500 font-medium">Có thay đổi (Chưa lưu)</span>}
                        {syncStatus === 'saving' && <span className="text-blue-500 animate-pulse flex items-center gap-1"><Cloud className="w-3 h-3"/> Đang lưu...</span>}
                        {syncStatus === 'saved' && <span className="text-emerald-500 flex items-center gap-1"><CheckCircle2 className="w-3 h-3"/> Đã lưu lên mây</span>}
                        {syncStatus === 'error' && <span className="text-rose-500 flex items-center gap-1"><AlertCircle className="w-3 h-3"/> Lỗi lưu</span>}
                      </div>
                    </div>

                    <div className="flex items-center gap-3">
                      <button onClick={handleSaveNote} className="flex items-center gap-1.5 text-xs px-3 py-1.5 bg-blue-600 text-white rounded hover:bg-blue-700 font-medium transition-colors shadow-sm">
                        <Save className="w-3.5 h-3.5" />
                        Lưu đám mây
                      </button>
                      <button onClick={clearNotes} className="text-xs text-slate-400 hover:text-rose-500 font-medium transition-colors">
                        Xóa
                      </button>
                    </div>
                  </div>
                  <textarea
                    value={notes}
                    onChange={handleNoteChange}
                    placeholder="Gõ ghi chú vào đây. Đừng quên bấm 'Lưu đám mây' khi viết xong nhé..."
                    className="flex-1 w-full p-4 resize-none focus:outline-none focus:ring-0 text-slate-700 text-lg bg-transparent"
                    spellCheck="false"
                  />
                </div>
              </div>
            </div>
          );
        }

        // --- COMPONENT LỘ TRÌNH (SCHEDULE VIEW) ---
        function ScheduleView({ handleNavigate }) {
            const today = new Date();
            const todayString = `${String(today.getDate()).padStart(2, '0')}/${String(today.getMonth() + 1).padStart(2, '0')}`;
            
            const todaysTask = MONTHLY_SCHEDULE.find(item => item.date === todayString);

            return (
               <div className="p-6 md:p-8 animate-in fade-in duration-300">
                   <h2 className="text-2xl font-bold text-slate-900 mb-6 flex items-center gap-2">
                       <Target className="w-6 h-6 text-blue-600" />
                       Lộ trình luyện tập tháng 4
                   </h2>

                   {/* Nhiệm vụ hôm nay */}
                   {todaysTask ? (
                       <div className="mb-8 bg-gradient-to-r from-blue-500 to-blue-600 rounded-2xl p-6 text-white shadow-md flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                           <div>
                               <p className="text-blue-100 font-medium mb-1">Nhiệm vụ hôm nay - {todaysTask.date} ({todaysTask.day})</p>
                               <h3 className="text-2xl md:text-3xl font-bold">{todaysTask.content}</h3>
                           </div>
                           <button
                               onClick={() => handleNavigate(todaysTask.targetTab, todaysTask.keyword)}
                               className="bg-white text-blue-600 px-6 py-3 rounded-xl font-bold shadow-sm hover:bg-blue-50 transition-colors whitespace-nowrap"
                           >
                               Vào bài học ngay
                           </button>
                       </div>
                   ) : (
                       <div className="mb-8 bg-slate-100 rounded-2xl p-6 text-slate-600 border border-slate-200">
                           <p className="font-medium">Hôm nay ({todayString}) không có lịch luyện tập trong lộ trình. Bạn có thể tự do ôn tập nhé!</p>
                       </div>
                   )}

                   {/* Danh sách toàn bộ lộ trình */}
                   <div className="bg-white rounded-xl border border-slate-200 overflow-hidden">
                       <div className="overflow-x-auto">
                           <table className="w-full text-left border-collapse min-w-[600px]">
                               <thead>
                                   <tr className="bg-slate-50 border-b border-slate-200 text-slate-500 text-sm">
                                       <th className="py-3 px-4 font-semibold w-1/3">Ngày</th>
                                       <th className="py-3 px-4 font-semibold w-1/2">Nội dung luyện tập</th>
                                       <th className="py-3 px-4 font-semibold text-right">Hành động</th>
                                   </tr>
                               </thead>
                               <tbody>
                                   {MONTHLY_SCHEDULE.map((item, idx) => {
                                       const isToday = item.date === todayString;
                                       
                                       const itemDay = parseInt(item.date.split('/')[0]);
                                       const itemMonth = parseInt(item.date.split('/')[1]);
                                       const currentDay = today.getDate();
                                       const currentMonth = today.getMonth() + 1;
                                       
                                       let isPast = false;
                                       if (currentMonth > itemMonth) isPast = true;
                                       else if (currentMonth === itemMonth && currentDay > itemDay) isPast = true;

                                       return (
                                           <tr key={idx} className={`border-b border-slate-100 last:border-0 transition-colors ${isToday ? 'bg-blue-50/80' : isPast ? 'bg-slate-50/50' : 'hover:bg-slate-50'}`}>
                                               <td className="py-3 px-4">
                                                   <div className="flex items-center gap-2">
                                                       <span className={`font-medium ${isToday ? 'text-blue-700' : isPast ? 'text-slate-400 line-through' : 'text-slate-700'}`}>{item.date}</span>
                                                       <span className={`text-sm ${isPast ? 'text-slate-300' : 'text-slate-400'}`}>({item.day})</span>
                                                       {isToday && <span className="text-[10px] bg-blue-600 text-white px-2 py-0.5 rounded-full ml-1 font-bold tracking-wider">HÔM NAY</span>}
                                                   </div>
                                               </td>
                                               <td className={`py-3 px-4 font-medium ${isToday ? 'text-blue-800' : isPast ? 'text-slate-400' : 'text-slate-800'}`}>
                                                   {item.content}
                                               </td>
                                               <td className="py-3 px-4 text-right">
                                                   <button
                                                       onClick={() => handleNavigate(item.targetTab, item.keyword)}
                                                       className={`text-sm px-4 py-1.5 rounded-lg font-medium transition-colors ${
                                                           isToday ? 'bg-blue-600 text-white hover:bg-blue-700 shadow-sm' : 
                                                           isPast ? 'bg-slate-100 text-slate-400 hover:bg-slate-200' : 
                                                           'bg-slate-100 text-slate-600 hover:bg-slate-200'
                                                       }`}
                                                   >
                                                       {isPast ? 'Ôn lại' : 'Đi tới bài'}
                                                   </button>
                                               </td>
                                           </tr>
                                       )
                                   })}
                               </tbody>
                           </table>
                       </div>
                   </div>
               </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
